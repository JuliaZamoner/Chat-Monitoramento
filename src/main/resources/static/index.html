<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat de Monitoramento</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<!-- Tela inicial onde o usuário informa o nome antes de entrar na sala. -->
<main class="single-layout">
    <section class="panel hero login-panel">
        <p class="hero-brand">Secretaria de Estado do Meio Ambiente</p>
        <p class="eyebrow">Bate-Papo</p>
        <h1>Monitor Colaborativo</h1>
        <!-- Formulário que captura o nome do usuário. -->
        <form id="join-form" class="join-form">
            <label for="sender">Entre com o seu nome</label>
            <div class="join-row">
                <input id="sender" name="sender" type="text" maxlength="24" required>
                <button type="submit">Acessar</button>
            </div>
        </form>

    </section>
</main>

<script>
    // Busca os elementos da tela que serão manipulados pelo JavaScript.
    const joinForm = document.getElementById('join-form');
    const senderInput = document.getElementById('sender');

    // Quando o formulário for enviado, o nome e salvo e o usuário vai para a sala do chat.
    joinForm.addEventListener('submit', (event) => {
        // Evita o envio tradicional do formulário e o recarregamento da página.
        event.preventDefault();
        // Remove espaços extras do nome digitado.
        const senderName = senderInput.value.trim();

        // Se o nome estiver vazio, mantém o foco no campo para o usuário corrigir.
        if (!senderName) {
            senderInput.focus();
            return;
        }

        // Guarda o nome apenas durante a sessão atual do navegador.
        sessionStorage.setItem('chat.sender', senderName);
        // Redireciona o usuário para a tela do chat.
        window.location.href = '/chat.html';
    });

    // Se já houver um nome salvo, reaproveita no campo para facilitar uma nova entrada.
    const storedName = sessionStorage.getItem('chat.sender');
    if (storedName) {
        senderInput.value = storedName;
    }
</script>
</body>
</html>
